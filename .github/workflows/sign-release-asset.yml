name: Sign release asset

on:
  workflow_dispatch:
    inputs:
      asset_name:
        description: "Release asset filename to sign"
        required: true
        default: "pdfextract.exe"
      release_id:
        description: "Release ID to sign (optional)"
        required: false
        default: ""
      tag_name:
        description: "Release tag to sign (optional)"
        required: false
        default: ""
      use_latest:
        description: "Use latest release when no ID/tag is provided"
        required: false
        default: "true"

permissions:
  id-token: write
  contents: write

jobs:
  sign-only:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Download release asset (by ID)
        uses: robinraju/release-downloader@v1.12
        if: ${{ github.event.inputs.release_id != '' }}
        with:
          releaseId: ${{ github.event.inputs.release_id }}
          fileName: ${{ github.event.inputs.asset_name || 'pdfextract.exe' }}
          out-file-path: .

      - name: Download release asset (by tag)
        uses: robinraju/release-downloader@v1.12
        if: ${{ github.event.inputs.release_id == '' && github.event.inputs.tag_name != '' }}
        with:
          tag: ${{ github.event.inputs.tag_name }}
          fileName: ${{ github.event.inputs.asset_name || 'pdfextract.exe' }}
          out-file-path: .

      - name: Download release asset (latest)
        uses: robinraju/release-downloader@v1.12
        if: ${{ github.event.inputs.release_id == '' && github.event.inputs.tag_name == '' && github.event.inputs.use_latest == 'true' }}
        with:
          latest: true
          fileName: ${{ github.event.inputs.asset_name || 'pdfextract.exe' }}
          out-file-path: .

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Sign exe
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: https://neu.codesigning.azure.net/
          signing-account-name: ibirico-ab
          certificate-profile-name: ibirico-certificate-profile
          files: ${{ github.workspace }}\${{ github.event.inputs.asset_name || 'pdfextract.exe' }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Resolve release tag
        id: tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.event.inputs.tag_name }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $id = '${{ github.event.inputs.release_id }}'
            if (-not [string]::IsNullOrWhiteSpace($id)) {
              $tag = gh api repos/${{ github.repository }}/releases/$id --jq .tag_name
            } else {
              $tag = gh release view --repo ${{ github.repository }} --json tagName --jq .tagName
            }
          }
          if ([string]::IsNullOrWhiteSpace($tag)) { throw 'Could not resolve a release tag.' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload signed asset (overwrite)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $asset = '${{ github.event.inputs.asset_name }}'
          if ([string]::IsNullOrWhiteSpace($asset)) { $asset = 'pdfextract.exe' }
          gh release upload '${{ steps.tag.outputs.tag }}' "$asset" --repo ${{ github.repository }} --clobber
